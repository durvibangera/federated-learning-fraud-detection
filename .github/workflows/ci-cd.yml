name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  HYPOTHESIS_PROFILE: ci

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy bandit safety
        pip install -r requirements.txt
    
    - name: Run Black formatter check
      run: |
        black --check --diff src/ tests/
    
    - name: Run Flake8 linter
      run: |
        flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 --exclude=__pycache__,venv
    
    - name: Run MyPy type checker
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional
    
    - name: Run Bandit security scanner
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ -ll
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Safety
      run: |
        python -m pip install --upgrade pip
        pip install safety
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
        safety check
    
    - name: Upload Safety report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: safety-dependency-report
        path: safety-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term -m "not slow"
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run property-based tests
      run: |
        pytest tests/ -v -m property --hypothesis-profile=ci
    
    - name: Upload property test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: property-test-results
        path: .hypothesis/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run integration tests
      run: |
        pytest tests/ -v -m integration

  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Bank Client image
      run: |
        docker build -f docker/Dockerfile.bank_client -t federated-fraud/bank-client:test .
    
    - name: Build Aggregation Server image
      run: |
        docker build -f docker/Dockerfile.aggregation_server -t federated-fraud/aggregation-server:test .
    
    - name: Run Trivy vulnerability scanner on Bank Client
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'federated-fraud/bank-client:test'
        format: 'sarif'
        output: 'trivy-bank-client.sarif'
    
    - name: Run Trivy vulnerability scanner on Aggregation Server
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'federated-fraud/aggregation-server:test'
        format: 'sarif'
        output: 'trivy-aggregation-server.sarif'
    
    - name: Upload Trivy scan results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: '.'

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run performance benchmarks
      run: |
        python tests/performance_benchmarks.py
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-benchmarks
        path: benchmark_results.json

  privacy-verification:
    name: Differential Privacy Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run DP guarantee verification
      run: |
        python tests/verify_dp_guarantees.py
    
    - name: Upload DP verification results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dp-verification-results
        path: dp_verification_results.json

  e2e-workflow:
    name: End-to-End Workflow Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run end-to-end workflow test
      run: |
        python tests/e2e_workflow_test.py
    
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: e2e_test_results.json

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-security, unit-tests, property-tests, integration-tests, container-security, performance-tests, privacy-verification, e2e-workflow]
    if: always()
    
    steps:
    - name: Check job statuses
      run: |
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo "Dependency Security: ${{ needs.dependency-security.result }}"
        echo "Unit Tests: ${{ needs.unit-tests.result }}"
        echo "Property Tests: ${{ needs.property-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-tests.result }}"
        echo "Container Security: ${{ needs.container-security.result }}"
        echo "Performance Tests: ${{ needs.performance-tests.result }}"
        echo "Privacy Verification: ${{ needs.privacy-verification.result }}"
        echo "E2E Workflow: ${{ needs.e2e-workflow.result }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, property-tests, integration-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and tag images
      run: |
        docker build -f docker/Dockerfile.bank_client -t federated-fraud/bank-client:staging .
        docker build -f docker/Dockerfile.aggregation_server -t federated-fraud/aggregation-server:staging .
        docker build -f docker/Dockerfile.mlflow -t federated-fraud/mlflow:staging .
    
    - name: Deploy to staging (placeholder)
      run: |
        echo "Deployment to staging environment would happen here"
        echo "This would typically push images to a registry and update staging infrastructure"
